<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Acceso al Catálogo Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --red:#E8192C;--dark:#080810;--dark3:#0E0E20;
      --border:#1C1C38;--white:#fff;--gray:#8890B8;--amber:#00D4FF;
    }
    body{
      font-family:'Exo 2',sans-serif;
      background:var(--dark);
      color:var(--white);
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }
    /* Grid background */
    body::before{
      content:'';
      position:fixed;inset:0;
      background-image:
        linear-gradient(rgba(0,212,255,.035) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,212,255,.035) 1px,transparent 1px);
      background-size:40px 40px;
      pointer-events:none;
      z-index:0;
    }
    /* Top color bar */
    .top-bar{
      position:fixed;top:0;left:0;right:0;
      height:4px;
      background:linear-gradient(90deg,#E8192C,#00D4FF);
      z-index:10;
    }
    /* Login card */
    .login-card{
      position:relative;z-index:5;
      background:#0d0d1e;
      border:1.5px solid rgba(0,212,255,.2);
      border-radius:24px;
      padding:40px 36px 36px;
      width:100%;
      max-width:400px;
      box-shadow:0 20px 60px rgba(0,0,0,.7),0 0 40px rgba(0,212,255,.05);
      animation:fadeUp .4s ease;
    }
    @keyframes fadeUp{
      from{opacity:0;transform:translateY(20px)}
      to{opacity:1;transform:translateY(0)}
    }
    /* Logo area */
    .logo-wrap{
      text-align:center;
      margin-bottom:28px;
    }
    .logo-wrap img{
      height:48px;
      object-fit:contain;
      filter:drop-shadow(0 2px 8px rgba(0,212,255,.2));
    }
    /* Title */
    .login-title{
      font-family:'Rajdhani',sans-serif;
      font-size:22px;
      font-weight:700;
      letter-spacing:2px;
      text-transform:uppercase;
      text-align:center;
      color:var(--white);
      margin-bottom:6px;
    }
    .login-sub{
      font-size:12px;
      color:var(--gray);
      text-align:center;
      letter-spacing:1px;
      margin-bottom:28px;
    }
    /* Divider */
    .divider{
      height:1px;
      background:linear-gradient(90deg,transparent,rgba(0,212,255,.3),transparent);
      margin-bottom:28px;
    }
    /* Input */
    .input-wrap{
      position:relative;
      margin-bottom:20px;
    }
    .input-wrap label{
      display:block;
      font-size:10px;
      font-weight:700;
      letter-spacing:2px;
      text-transform:uppercase;
      color:var(--amber);
      margin-bottom:8px;
    }
    .input-wrap input{
      width:100%;
      padding:14px 16px;
      background:rgba(255,255,255,.04);
      border:1.5px solid var(--border);
      border-radius:12px;
      color:var(--white);
      font-family:'Exo 2',sans-serif;
      font-size:15px;
      transition:border-color .2s,box-shadow .2s;
      outline:none;
    }
    .input-wrap input::placeholder{color:rgba(136,144,184,.5)}
    .input-wrap input:focus{
      border-color:rgba(0,212,255,.5);
      box-shadow:0 0 0 3px rgba(0,212,255,.08);
    }
    /* Button */
    .btn-login{
      width:100%;
      padding:16px;
      background:linear-gradient(135deg,#00D4FF,#0080cc);
      border:none;
      border-radius:12px;
      color:#000;
      font-family:'Rajdhani',sans-serif;
      font-size:16px;
      font-weight:700;
      letter-spacing:2px;
      text-transform:uppercase;
      cursor:pointer;
      transition:all .2s;
      box-shadow:0 4px 20px rgba(0,212,255,.3);
      margin-top:4px;
    }
    .btn-login:hover{
      transform:translateY(-2px);
      box-shadow:0 8px 28px rgba(0,212,255,.4);
    }
    .btn-login:active{transform:scale(.98)}
    .btn-login:disabled{
      opacity:.6;cursor:not-allowed;transform:none;
    }
    /* Error */
    .msg-error{
      margin-top:14px;
      padding:10px 14px;
      background:rgba(232,25,44,.1);
      border:1px solid rgba(232,25,44,.3);
      border-radius:8px;
      color:#ff6b7a;
      font-size:13px;
      text-align:center;
      display:none;
    }
    .msg-error.show{display:block}
    /* Footer */
    .login-footer{
      text-align:center;
      margin-top:24px;
      font-size:11px;
      color:rgba(136,144,184,.5);
      letter-spacing:.5px;
    }
    @media(max-width:440px){
      .login-card{margin:16px;padding:32px 24px 28px;border-radius:20px}
    }
  </style>
</head>

  <div class="login-title">Catálogo Digital</div>
  <div class="login-sub">Acceso exclusivo · 2026</div>

  <div class="divider"></div>

  <div class="input-wrap">
    <label for="password">Contraseña de acceso</label>
    <input type="password" id="password" placeholder="Ingresa tu contraseña" autocomplete="current-password">
  </div>

  <button class="btn-login" id="btnLogin">Ingresar al catálogo</button>

  <div class="msg-error" id="msg">Contraseña incorrecta. Intenta de nuevo.</div>

  <div class="login-footer">AUTOPARTES Y MÁS S.A. DE C.V. &nbsp;·&nbsp; APYMSA 2026</div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDwJRmsCiPVO6BhZaWRyf1gDZeJmYYz0KU",
    authDomain: "digitalizacion-cfadf.firebaseapp.com",
    projectId: "digitalizacion-cfadf",
    storageBucket: "digitalizacion-cfadf.firebasestorage.app",
    messagingSenderId: "439767153856",
    appId: "1:439767153856:web:26b3245fefd6cf54b90125"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const EMAIL_FIJO = "acceso@digitalizacion.local";

  const btn   = document.getElementById("btnLogin");
  const input = document.getElementById("password");
  const msg   = document.getElementById("msg");

  function doLogin(){
    const password = input.value.trim();
    if(!password) return;
    btn.disabled = true;
    btn.textContent = "Verificando...";
    msg.classList.remove("show");

    signInWithEmailAndPassword(auth, EMAIL_FIJO, password)
      .then(() => {
        btn.textContent = "\u2705 Acceso concedido";
        setTimeout(() => { window.location.href = "index.html"; }, 400);
      })
      .catch(() => {
        msg.classList.add("show");
        btn.disabled = false;
        btn.textContent = "Ingresar al catálogo";
        input.value = "";
        input.focus();
      });
  }

  btn.addEventListener("click", doLogin);
  input.addEventListener("keydown", function(e){ if(e.key === "Enter") doLogin(); });
  input.focus();
</script>
